<!doctype html>
<html lang="en">

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"

    <title>Our Memories ❤️</title>

      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-pink: #ff4b6e;
        --bg-dark: #000000;
        --glass-bg: rgba(20, 20, 20, 0.7);
        --glass-border: rgba(255, 75, 110, 0.2);
      }

      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg-dark);
        font-family: "Fredoka", sans-serif;
        color: #ffffff;
        overflow-x: hidden;
      }

      /* Background Animations (Hearts & Cat) */
      .floating-shape {
        position: fixed;
        opacity: 0;
        animation: floatUp 8s linear infinite;
        z-index: 1;
        pointer-events: none;
      }
      @keyframes floatUp {
        0% {
          transform: translateY(100vh) scale(0.5);
          opacity: 0;
        }
        20% {
          opacity: 0.6;
        }
        80% {
          opacity: 0.6;
        }
        100% {
          transform: translateY(-20vh) scale(1.2);
          opacity: 0;
        }
      }

      .cat-track {
        position: fixed;
        bottom: 5%;
        left: 0;
        width: 100%;
        height: 60px;
        pointer-events: none;
        z-index: 2;
      }
      .live-cat {
        position: absolute;
        height: 60px;
        animation: scurry 12s linear infinite;
      }
      @keyframes scurry {
        0% {
          left: -20%;
          transform: scaleX(1);
        }
        45% {
          left: 110%;
          transform: scaleX(1);
        }
        50% {
          left: 110%;
          transform: scaleX(-1);
        }
        95% {
          left: -20%;
          transform: scaleX(-1);
        }
        100% {
          left: -20%;
          transform: scaleX(1);
        }
      }

      /* Flora Borders */
      #flora-border {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 5;
      }
      .flora-element {
        position: absolute;
        transform: scale(0) rotate(0deg);
        transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .grow-flora .flora-element {
        transform: scale(1) rotate(var(--rot));
      }
      .grow-flora .flora-element svg {
        animation: breathe 4s ease-in-out infinite alternate;
        animation-delay: var(--delay);
      }
      @keyframes breathe {
        0% {
          transform: scale(0.95);
        }
        100% {
          transform: scale(1.05);
        }
      }

      /* Screens */
      .screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition:
          opacity 1s ease,
          visibility 1s;
        z-index: 10;
      }
      .hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Screen 1: Login */
      #login-screen {
        z-index: 100;
        background: var(--bg-dark);
      }
      .glass-panel {
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        width: 80%;
        max-width: 350px;
        position: relative;
        z-index: 10;
      }
      .glass-panel h2 {
        margin-top: 0;
        font-size: 1.5rem;
        color: var(--primary-pink);
      }
      input[type="text"] {
        width: 100%;
        padding: 12px;
        margin: 20px 0;
        border-radius: 10px;
        border: 1px solid var(--glass-border);
        background: rgba(0, 0, 0, 0.5);
        color: white;
        font-family: inherit;
        font-size: 1.1rem;
        text-align: center;
        box-sizing: border-box;
        outline: none;
        transition: border 0.3s;
      }
      input[type="text"]:focus {
        border-color: var(--primary-pink);
      }
      button {
        background: var(--primary-pink);
        color: white;
        border: none;
        padding: 12px 30px;
        font-size: 1.2rem;
        border-radius: 50px;
        cursor: pointer;
        font-family: inherit;
        box-shadow: 0 0 15px rgba(255, 75, 110, 0.4);
        transition: transform 0.2s;
      }
      button:active {
        transform: scale(0.95);
      }
      .error-msg {
        color: #ff4b4b;
        font-size: 0.9rem;
        min-height: 20px;
        margin-top: -10px;
        margin-bottom: 10px;
      }

      /* Screen 2: Timeline */
      #timeline-screen {
        justify-content: flex-start;
        overflow-y: auto;
        z-index: 50;
        padding: 40px 0;
      }
      .timeline-container {
        position: relative;
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
        padding: 20px 0;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .timeline-container::before {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        left: 50%;
        width: 4px;
        background: var(--primary-pink);
        margin-left: -2px;
        border-radius: 2px;
      }
      .memory-node {
        position: relative;
        width: 50%;
        margin-bottom: 40px;
        display: flex;
        align-items: center;
        cursor: pointer;
      }
      .memory-node.left {
        align-self: flex-start;
        justify-content: flex-end;
        padding-right: 30px; /* Reverted back to the original value */
      }
      .memory-node.right {
        align-self: flex-end;
        justify-content: flex-start;
        padding-left: 30px; /* Reverted back to the original value */
      }
      /* New: specific gap just for the text labels */
      .memory-node.left .date-label {
        margin-right: 16px; /* Space on the left for text on the right side */
      }
      .memory-node.right .date-label {
        margin-left: 16px; /* Space on the right for text on the left side */
      }
      .memory-node::before {
        content: "";
        position: absolute;
        top: 50%;
        width: 30px;
        height: 3px;
        background: var(--primary-pink);
      }
      .memory-node.left::before {
        right: 0;
      }
      .memory-node.right::before {
        left: 0;
      }
      .dot {
        background: var(--primary-pink);
        border-radius: 50%;
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        box-shadow: 0 0 15px rgba(255, 75, 110, 0.6);
        transition: transform 0.2s;
        z-index: 2;
      }
      .memory-node:hover .dot {
        transform: translateY(-50%) scale(1.1);
      }
      .memory-node.left .dot {
        right: -2px;
        transform: translate(50%, -50%);
      }
      .memory-node.right .dot {
        left: -2px;
        transform: translate(-50%, -50%);
      }
      .memory-node.left:hover .dot {
        transform: translate(50%, -50%) scale(1.1);
      }
      .memory-node.right:hover .dot {
        transform: translate(-50%, -50%) scale(1.1);
      }
      .date-label {
        font-size: 1.1rem;
        font-weight: 500;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        z-index: 2;
      }

      /* Modal View & Typewriter */
      /* Update: Modal Media initial state (hidden via clip-path) */
      /* Updated: Modal Media initial state */
      .modal-media {
        border-radius: 12px;
        overflow: hidden;
        display: none; /* Keep it completely hidden until text finishes */
      }

      /* New: Premium "Soft Bloom" Reveal */
      @keyframes softBloom {
        0% {
          opacity: 0;
          transform: scale(0.95) translateY(15px);
          filter: blur(10px);
        }
        100% {
          opacity: 1;
          transform: scale(1) translateY(0);
          filter: blur(0px);
        }
      }

      /* Applied by JS when typing finishes */
      .modal-media.reveal-active {
        display: block; /* Show the container */
        margin-top: 25px; /* Add a nice gap between the typed text and the image */
        animation: softBloom 1.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6); /* Adds modern depth */
      }

      .modal-media img {
        width: 100%;
        display: block;
        pointer-events: none;
      }

      /* New: styling for the image itself inside the container */
      .modal-media img {
        width: 100%;
        display: block; /* Avoid inline spacing */
        pointer-events: none; /* Let clicks go through to close modal */
      }

      #memory-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        z-index: 200;
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s;
        backdrop-filter: blur(5px);
      }
      #memory-modal.active {
        opacity: 1;
        visibility: visible;
      }
      .modal-content {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 15px;
        width: 85%;
        max-width: 400px;
        max-height: 80vh;
        padding: 25px;
        overflow-y: auto;
        position: relative;
      }
      .close-btn {
        position: absolute;
        top: 15px; /* Bumped up a little more */
        right: 12px; /* Tighter against the edge */
        font-size: 1.2rem; /* Reduced cross mark size from 1.5rem */
        color: white;
        cursor: pointer;
        border: none;
        background: transparent;
        z-index: 10;
        /* Redone tighter padding and shadow to make the "outline" smaller */
        padding: 10px;
        box-shadow: 0 0 4px rgba(255, 75, 110, 0.5); /* Tighter blur and shadow */
        border-radius: 45px; /* Tight border-radius */
      }
      .modal-date {
        color: var(--primary-pink);
        font-size: 1.3rem;
        margin-bottom: 15px;
        border-bottom: 1px solid var(--glass-border);
        padding-bottom: 18px; /* Increased to push the line down further */
        padding-right: 30px; /* Prevents text from creeping under the close button */
      }

      .text-container {
        position: relative;
      }
      #modal-text {
        font-size: 1.1rem;
        line-height: 1.5;
        font-weight: 400;
        white-space: pre-wrap;
        display: inline;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 1);
      }

      .cursor {
        display: inline-block;
        width: 3px;
        background-color: var(--primary-pink);
        animation: blink 0.8s infinite;
        vertical-align: text-bottom;
        margin-left: 2px;
        box-shadow: 0 0 5px var(--primary-pink);
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      .typing-particle {
        position: fixed;
        font-size: 16px;
        pointer-events: none;
        z-index: 250;
        animation: popSpark 0.8s ease-out forwards;
      }
      @keyframes popSpark {
        0% {
          transform: translate(0, 0) scale(1);
          opacity: 1;
        }
        100% {
          transform: translate(var(--tx), var(--ty)) scale(0);
          opacity: 0;
        }
      }
    </style>
  </head>

      // 2. Visual Effects Generation (Hearts & Flora)
      const heartTypes = ["💖", "💘", "💝", "💕", "✨"];
      for (let i = 0; i < 12; i++) {
        let shape = document.createElement("div");
        shape.innerHTML =
          heartTypes[Math.floor(Math.random() * heartTypes.length)];
        shape.className = "floating-shape";
        shape.style.left = Math.random() * 100 + "vw";
        shape.style.animationDuration = Math.random() * 6 + 6 + "s";
        shape.style.animationDelay = Math.random() * 5 + "s";
        shape.style.fontSize = Math.random() * 15 + 15 + "px";
        document.body.appendChild(shape);
      }

      const floraContainer = document.getElementById("flora-border");
      const flowerColors = ["#ff9a9e", "#fecfef", "#ffb6b9", "#ffdde1"];

      function spawnFlora(edge, positionPercent, isLeaf) {
        const el = document.createElement("div");
        el.className = "flora-element";
        if (edge === "top") {
          el.style.top = "-25px";
          el.style.left = positionPercent + "vw";
        } else if (edge === "bottom") {
          el.style.bottom = "-25px";
          el.style.left = positionPercent + "vw";
        } else if (edge === "left") {
          el.style.left = "-25px";
          el.style.top = positionPercent + "vh";
        } else if (edge === "right") {
          el.style.right = "-25px";
          el.style.top = positionPercent + "vh";
        }

        const rot = Math.random() * 360;
        const size = isLeaf ? Math.random() * 20 + 30 : Math.random() * 30 + 40;
        el.style.width = size + "px";
        el.style.height = size + "px";
        el.style.setProperty("--rot", rot + "deg");
        el.style.setProperty("--delay", Math.random() * 2 + "s");
        el.style.transitionDelay = Math.random() * 1.2 + "s";

        if (isLeaf) {
          el.innerHTML = `<svg viewBox="0 0 100 100" width="100%" height="100%"><path d="M10 90 C 10 10, 90 10, 90 10 C 90 90, 10 90, 10 90" fill="#a8e6cf"/><path d="M10 90 L 90 10" stroke="#87c7b0" stroke-width="4" stroke-linecap="round"/></svg>`;

          const pCol =
            flowerColors[Math.floor(Math.random() * flowerColors.length)];
          el.innerHTML = `<svg viewBox="0 0 100 100" width="100%" height="100%"><circle cx="50" cy="25" r="25" fill="${pCol}"/><circle cx="50" cy="75" r="25" fill="${pCol}"/><circle cx="25" cy="50" r="25" fill="${pCol}"/><circle cx="75" cy="50" r="25" fill="${pCol}"/><circle cx="50" cy="50" r="15" fill="#fff59d"/></svg>`;

        spawnFlora("left", pos, Math.random() > 0.4);
        spawnFlora("right", pos, Math.random() > 0.4);

          const sideClass = index % 2 === 0 ? "left" : "right";
          const node = document.createElement("div");
          node.className = `memory-node ${sideClass}`;
          node.innerHTML = `
                <div class="dot" style="width: ${dotSize}px; height: ${dotSize}px;"></div>
                <div class="date-label">${memory.date}</div>
            `;
          node.addEventListener("click", () => openModal(memory));
          timelineContainer.appendChild(node);
        });
      }

      // 4. Typewriter & Particle Logic
      function createParticle() {
        const rect = cursorElement.getBoundingClientRect();
        const particle = document.createElement("div");
        particle.className = "typing-particle";
        particle.innerHTML = Math.random() > 0.5 ? "✨" : "💖";
        particle.style.left = rect.left - 5 + "px";
        particle.style.top = rect.top - 5 + "px";
        const tx = (Math.random() - 0.5) * 60;
        const ty = (Math.random() - 0.5) * 60;
        particle.style.setProperty("--tx", `${tx}px`);
        particle.style.setProperty("--ty", `${ty}px`);
        document.body.appendChild(particle);
        setTimeout(() => particle.remove(), 800);
      }

      function typeWriter() {
        if (typewriterIndex < currentMemoryText.length) {
          const char = currentMemoryText.charAt(typewriterIndex);
          textElement.innerHTML += char;

          if (char !== " " && char !== "\n") {
            createParticle();
          }

          typewriterIndex++;
          // Typing speed (in milliseconds)
          typewriterTimeout = setTimeout(typeWriter, 80);
        } else {
          cursorElement.style.display = "none";

          // Image reveal triggered after typing completes
          const mediaContainer = document.getElementById("modal-media");
          if (currentMemoryMedia) {
            mediaContainer.innerHTML = currentMemoryMedia;
            mediaContainer.classList.add("reveal-active");
          }
        }
      }

      function openModal(memory) {
        document.getElementById("modal-date").textContent = memory.date;

        // Hide media container before starting
        currentMemoryMedia = memory.media;
        const mediaContainer = document.getElementById("modal-media");
        mediaContainer.innerHTML = "";
        mediaContainer.classList.remove("reveal-active");

        modal.classList.add("active");

        // Reset and start typewriter
        clearTimeout(typewriterTimeout);
        currentMemoryText = memory.text;
        typewriterIndex = 0;
        textElement.innerHTML = "";
        cursorElement.style.display = "inline-block";
        typeWriter();
      }

      document.getElementById("close-modal").addEventListener("click", () => {
        modal.classList.remove("active");
        clearTimeout(typewriterTimeout); // Stop typing if closed early
      });

      modal.addEventListener("click", (e) => {
        if (e.target === modal) {
          modal.classList.remove("active");
          clearTimeout(typewriterTimeout);
        }
      });
    </script>
  </body>
</html>
